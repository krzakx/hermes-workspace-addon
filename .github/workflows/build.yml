name: Build Add-on

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., 2.3.0)'
        required: true
        type: string

jobs:
  build:
    name: Build & Push Multi-arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ github.event.inputs.version }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (tag: $TAG)"

      - name: Build and push addon
        uses: home-assistant/builder@master
        with:
          args: |
            --repository /github/workspace \
            --addon . \
            --target ghcr.io/krzakx/hermes-workspace-addon \
            --tag ${{ steps.meta.outputs.tag }} \
            --version ${{ steps.meta.outputs.version }} \
            --docker-arg BUILD_VERSION:${{ steps.meta.outputs.version }}

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Hermes Workspace ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
